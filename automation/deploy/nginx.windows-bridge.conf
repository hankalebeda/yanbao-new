events {}

http {
    server {
        listen 18100;
        server_name _;

        location / {
            proxy_pass http://192.168.232.1:38001;
            proxy_http_version 1.1;
            proxy_set_header Host localhost:38001;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 18192;
        server_name _;

        location / {
            proxy_pass http://192.168.232.1:8092;
            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 18193;
