[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    feature(id): Feature acceptance test marker (e.g. FR-01, FR-06)
addopts =
    --ignore=tests/test_ai_api_contract.py
    --ignore=tests/test_api.py
    --ignore=tests/test_data_sources.py
    --ignore=tests/test_e2e_sim.py
    --ignore=tests/test_trade_calendar.py
    --ignore=tests/test_gate_browser_playwright.py
tmp_path_retention_policy = none
norecursedirs =
    basetemp_audit
    tmp
    tmp_*
    tmp_pytest_*
    tmp_pytest_run*
    runtime
    data
    .venv
    venv
    env
