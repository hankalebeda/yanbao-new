<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 - 服务器错误</title>
  <link rel="stylesheet" href="/static/demo.css">
  <style>
    .error-page { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; }
    .error-code { font-family: var(--font-display); font-size: clamp(3rem, 12vw, 4.5rem); font-weight: 700; color: var(--sell, #e74c3c); line-height: 1; letter-spacing: -0.03em; margin-bottom: 16px; }
    .error-title { font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 600; color: var(--ink); letter-spacing: 0; margin-bottom: 8px; }
    .error-desc { font-size: var(--fs-lg); color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
    .error-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand">A股研报平台</a>
  </nav>
  <div class="error-page">
    <div class="error-code">500</div>
    <div class="error-title">服务器开小差了</div>
    <div class="error-desc">系统遇到了一个内部错误，请稍后再试。如果问题持续，请联系管理员。</div>
    <div class="error-actions">
      <a href="/" class="btn-primary">回到首页</a>
      <a href="/reports" class="btn-outline">查看研报列表</a>
    </div>
  </div>
</body>
</html>
