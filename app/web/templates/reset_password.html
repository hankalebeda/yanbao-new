<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重置密码 - A股研报平台</title>
  <link rel="stylesheet" href="/static/demo.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand">A股研报平台</a>
    <button class="nav-toggle" aria-label="菜单" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
      {% include "_nav_links.html" %}
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>重置密码</h2>
      </div>
      {% if token_valid %}
      <form id="reset-form">
        <input type="hidden" id="token" value="{{ reset_token }}">
        <div class="auth-field">
          <input type="password" id="password" placeholder="新密码（≥8位，含字母和数字）" required minlength="8">
        </div>
        <div class="auth-field">
          <input type="password" id="password2" placeholder="确认新密码" required>
        </div>
        <button type="submit" class="auth-btn-primary">重置密码</button>
      </form>
      {% else %}
      <p class="auth-note">重置链接无效或已过期，请<a href="/forgot-password">重新申请</a>。</p>
      {% endif %}
      <div class="auth-card-footer">
        <p>想起密码？<a href="/login" class="auth-link-primary">返回登录</a></p>
      </div>
      <p id="msg" class="muted" style="margin-top: var(--space-3); text-align: center;"></p>
    </div>
  </main>

  {% include "_app_config.html" %}
  <script src="/static/api-bridge.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      document.getElementById('token').value = token;
      if (!token) document.getElementById('msg').textContent = '无效的重置链接，请从邮件或找回密码页面重新获取。';
      document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var p1 = document.getElementById('password').value;
        var p2 = document.getElementById('password2').value;
        if (p1 !== p2) { document.getElementById('msg').textContent = '两次密码不一致'; return; }
        var res = await postResetPassword({ token: token, password: p1 });
        if (res && res.success) {
          document.getElementById('msg').textContent = '密码重置成功，请返回登录';
          setTimeout(function() { window.location.href = '/login'; }, 1500);
        } else {
          document.getElementById('msg').textContent = res && res.message ? res.message : '重置失败';
        }
      });
    })();
  </script>
</body>
</html>
