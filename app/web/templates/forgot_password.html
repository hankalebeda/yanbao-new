<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找回密码 - A股研报平台</title>
  <link rel="stylesheet" href="/static/demo.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand">A股研报平台</a>
    <button class="nav-toggle" aria-label="菜单" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
      {% include "_nav_links.html" %}
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>找回密码</h2>
      </div>
      <form id="forgot-form">
        <div class="auth-field">
          <input type="email" id="email" name="email" placeholder="邮箱" required>
        </div>
        <button type="submit" class="auth-btn-primary">发送重置链接</button>
      </form>
      <p id="forgot-msg" class="muted" style="margin-top: var(--space-3); text-align: center;"></p>
      <div class="auth-card-footer">
        <p>想起密码？<a href="/login" class="auth-link-primary">返回登录</a></p>
      </div>
      <p class="muted" style="margin-top: var(--space-5); font-size: var(--fs-2xs); text-align: center;">投资有风险，本平台仅供参考。</p>
    </div>
  </main>

  {% include "_app_config.html" %}
  <script src="/static/api-bridge.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var res = await postForgotPassword({ email: email });
      var msg = document.getElementById('forgot-msg');
      if (res && res.success && res.data && res.data.ok) {
        if (res.data.reset_url) {
          msg.textContent = '重置链接已生成，请复制链接到浏览器打开：';
          msg.innerHTML += '<br><a href="' + res.data.reset_url + '" style="word-break:break-all;">' + res.data.reset_url + '</a>';
        } else {
          msg.textContent = '若该邮箱已注册，重置请求已提交，请按后续指引完成密码重置。';
        }
      } else {
        msg.textContent = res && res.message ? res.message : '请求失败';
      }
    });
  </script>
</body>
</html>
